apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: My Kubelab.sh
    theme: dark
  services.yaml: |
    - Cluster Services:
        - ArgoCD:
            href: https://argocd.kubelab.sh
            description: GitOps for Kubernetes
            icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/argo-cd.png
        - Longohrn:
          href: https://longhorn.kubelab.sh
          description: Longhorn control panel for PV storage
          icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/longhorn.png
  bookmarks.yaml: |
    []
  widgets.yaml: |
    []
  kubernetes.yaml: |
    {}
  docker.yaml: |
    {}
